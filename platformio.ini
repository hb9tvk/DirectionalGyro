; PlatformIO Project Configuration File
; Directional Gyro — ESP32-S3 port
; Original: https://github.com/ElectronDon66/Directional-Gyro
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-s3-devkitc-1]
board = esp32-s3-devkitc-1
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
monitor_echo = yes
board_upload.flash_size = 4MB
board_build.partitions = min_spiffs.csv
board_build.arduino.memory_type = qio_qspi

lib_deps =
    bodmer/TFT_eSPI @ ^2.5.43
    adafruit/Adafruit BNO08x @ ^1.2.5
    adafruit/Adafruit BusIO @ ^1.16.1

build_flags =
        -DARDUINO_USB_CDC_ON_BOOT=1
        -DBOARD_HAS_PSRAM
        -DCORE_DEBUG_LEVEL=0    ; Set to 5 for full debug output
        -Os
        ; ---- TFT_eSPI configuration for GC9A01 round display ----
        ; USER_SETUP_LOADED tells the library all settings are provided here
        -DUSER_SETUP_LOADED
        -DGC9A01_DRIVER
        -DTFT_WIDTH=240
        -DTFT_HEIGHT=240
        ; SPI pins — adjust to match your wiring
        -DTFT_MOSI=11
        -DTFT_SCLK=12
        -DTFT_CS=10
        -DTFT_DC=4
        -DTFT_RST=5
        ; Fonts
        -DLOAD_GLCD
        -DLOAD_FONT2
        -DLOAD_FONT4
        -DSMOOTH_FONT
        ; SPI speed
        "-DSPI_FREQUENCY=40000000"
        "-DSPI_READ_FREQUENCY=20000000"
